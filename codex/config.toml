model = "gpt-5.5"
project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536

approval_policy = "never"
sandbox_mode = "danger-full-access"

model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
notice.hide_full_access_warning = true

[features]
hooks = true

# Mirror of the monorepo's Claude Code hooks (the Claude hooks themselves live in
# blux-monorepo/.claude/ and ~/.claude/ -- these are the Codex-side equivalents).
# SessionStart: keep `main` fresh across all monorepo sub-repos.
[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "/Users/joonsu/workspace/blux-monorepo/.claude/hooks/refresh-main.sh"
timeout = 60

# UserPromptSubmit: detect BLX-N issue IDs, inject issue context, auto-flip backlog/todo -> in-progress.
[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "uv run --no-project --python 3.12 python /Users/joonsu/.codex/hooks/blx-issue-detect.py"
timeout = 30

# Stop (end of turn): in blux-ml only, ruff --fix + format changed .py files and `uv lock` if pyproject.toml changed.
# (Codex's apply_patch tool isn't reliably hookable per-edit, so this runs over the working-tree diff instead of per-file.)
[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "/Users/joonsu/.codex/hooks/blux-ml-post-turn-lint.sh"
timeout = 120

